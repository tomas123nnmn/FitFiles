<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FitFiles | File Repository</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #0d0d0d; color: #00ff41; padding: 20px; }
        .container { max-width: 900px; margin: auto; border: 1px solid #333; padding: 20px; background: #111; }
        header { text-align: center; border-bottom: 2px solid #00ff41; margin-bottom: 20px; }
        .upload-section { background: #222; padding: 15px; border: 1px dashed #00ff41; text-align: center; margin-bottom: 20px; }

        a { color: #ff00ff; text-decoration: none; }
        a:hover { text-decoration: underline; background: #00ff41; color: #000; }
        .btn { background: #00ff41; color: #000; padding: 10px 20px; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">

</html>
